<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .table th {
            background-color: #343a40;
            color: white;
        }
        .present {
            color: green;
            font-weight: bold;
        }
        .absent {
            color: red;
            font-weight: bold;
        }
        .attendance-percentage {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .percentage-high {
            background-color: #28a745;
            color: white;
        }
        .percentage-low {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center">View Attendance</h2>
    
    <!-- Student Attendance Form -->
    <form method="POST" action="{{ url_for('attendance.view_attendance') }}" class="mb-4">
        <div class="input-group">
            <input type="text" name="roll_number" class="form-control" placeholder="Enter Roll Number" required>
            <button type="submit" class="btn btn-primary">Check Attendance</button>
        </div>
    </form>

    {% if records %}
    <h4 class="text-center">Attendance for Roll No: {{ roll_number }}</h4>

    <!-- Attendance Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for record in records %}
            <tr>
                <td>{{ record.date }}</td>
                <td class="{% if record.status == 'Present' %}present{% else %}absent{% endif %}">
                    {{ record.status }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Attendance Percentage -->
    <div class="attendance-percentage {% if percentage >= 75 %}percentage-high{% else %}percentage-low{% endif %}">
        Attendance Percentage: {{ "%.2f"|format(percentage) }}%
    </div>
    {% endif %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
