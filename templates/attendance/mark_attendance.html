<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .btn-present {
            background-color: #28a745;
            color: white;
        }
        .btn-absent {
            background-color: #dc3545;
            color: white;
        }
        .btn-present:hover {
            background-color: #218838;
        }
        .btn-absent:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center">Mark Attendance</h2>
    <form method="POST" action="{{ url_for('attendance.mark_attendance') }}">
        <table class="table table-bordered mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Roll Number</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.roll_number }}</td>
                    <td>
                        <input type="radio" name="status_{{ student.roll_number }}" value="Present" class="btn-check" id="present_{{ student.roll_number }}">
                        <label class="btn btn-present" for="present_{{ student.roll_number }}">Present</label>

                        <input type="radio" name="status_{{ student.roll_number }}" value="Absent" class="btn-check" id="absent_{{ student.roll_number }}">
                        <label class="btn btn-absent" for="absent_{{ student.roll_number }}">Absent</label>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-primary w-100">Submit Attendance</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
