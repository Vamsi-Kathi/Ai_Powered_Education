<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: auto;
        }
        .event {
            margin: 15px 0;
            padding: 10px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .button {
            background: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Upcoming Events</h2>

    <div class="event">
        <h3>Hackathon 2025</h3>
        <p>Date: March 15, 2025</p>
        <p>Location: Online</p>
        <a href="#" class="button">Register</a>
    </div>

    <div class="event">
        <h3>AI & ML Conference</h3>
        <p>Date: April 20, 2025</p>
        <p>Location: University Auditorium</p>
        <a href="#" class="button">Learn More</a>
    </div>

    <div class="event">
        <h3>Coding Contest</h3>
        <p>Date: May 5, 2025</p>
        <p>Location: Campus Lab</p>
        <a href="#" class="button">Join Now</a>
    </div>
</div>

</body>
</html>
