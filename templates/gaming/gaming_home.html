<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming & Puzzles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: auto;
        }
        .game {
            margin: 15px 0;
            padding: 10px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .button {
            background: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gaming & Puzzles</h2>

    <div class="game">
        <h3>Number Guessing Game</h3>
        <p>Try to guess a number between 1 and 100!</p>
        <a href="#" class="button">Play Now</a>
    </div>

    <div class="game">
        <h3>Word Scramble</h3>
        <p>Unscramble the words and test your vocabulary!</p>
        <a href="#" class="button">Start Game</a>
    </div>

    <div class="game">
        <h3>Sudoku</h3>
        <p>Challenge yourself with Sudoku puzzles.</p>
        <a href="#" class="button">Solve Now</a>
    </div>

    <div class="game">
        <h3>Chess</h3>
        <p>Play a game of chess against AI.</p>
        <a href="#" class="button">Play Chess</a>
    </div>
</div>

</body>
</html>
